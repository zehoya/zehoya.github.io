<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        * {

        body {

        }

        .header {
            text-align: center;

        }

            font-size: 2.8rem;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #2b5e2f, #5f8b5c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #4a5e45;
            max-width: 680px;
            margin: 0 auto;

            color: #2e6734;

        }

            aspect-ratio: 1 / 1;
            background: linear-gradient(135deg, #eef3ea, #e2ebde);

            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            border-bottom: 1px solid #ecf3e8;

            max-height: 100%;

            height: auto;
            object-fit: contain;
            border-radius: 18px;
        }

            margin-bottom: 0.5rem;

            align-items: center;
            gap: 4px;

            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(30, 40, 25, 0.75);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;

            display: flex;
        }

            border-radius: 2rem;
            overflow-y: auto;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3);
            animation: modalFadeIn 0.2s ease;

            from { opacity: 0; transform: scale(0.96); }

        }

            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #7c9377;
            transition: color 0.2s;
        }

        }

            font-size: 0.7rem;

        }

            border-radius: 10px;
        }

        .modal-card::-webkit-scrollbar-thumb {
            background: #b9d2b2;

        @media (max-width: 680px) {

</head>

        { code: "ATM-er", cn: "送钱者", intro: "你以为我很有钱吗？", image: "ATM-er.png", desc: "恭喜您，您竟然测出了这个世界上最稀有的人格。您或将成为金融界的未解之谜——是的，ATM-er不一定真的“送钱”，但可能永远在“支付”。支付时间、支付精力、支付耐心、支付一个本该安宁的夜晚。因此像一部老旧但坚固的ATM机，插进去的是别人的焦虑和麻烦，吐出来的是“没事，有我”的安心保证。您的人生就是一场盛大的、无人喝彩的单人付账秀。您竟用磐石般的可靠，承受了瀑布般的索取，偶尔夜深人静才会对着账单——可能是精神上的——发出一声叹息：我这该死的、无处安放的责任心啊。" },
        { code: "Dior-s", cn: "屌丝", intro: "等着我屌丝逆袭。", image: "Dior-s.jpg", desc: "恭喜！您并非屌丝，您是犬儒主义先贤第欧根尼失散多年的精神传人，因为屌丝的全称是 Diogenes' Original Realist - sage。Dior-s人格，是对当代消费主义陷阱和成功学PUA最彻底的蔑视。他们不是“不求上进”，而是早已看穿一切“上进”的尽头不过是更高级的牢房。屌丝有着大智慧。当别人在追逐风口，被时代的巨浪拍得七荤八素时，Dior-s早已在自己的精神木桶里晒着太阳，达到了“人桶合一”的至高境界。" },
        { code: "BOSS", cn: "领导者", intro: "方向盘给我，我来开。", image: "BOSS.png", desc: "BOSS是一个手里永远拿着方向盘的人。哪怕油箱已经亮了红灯，哪怕导航在胡说八道，你都会面无表情地说一句：我来开。然后真的把车开到了目的地。该人格拥有独立的物理法则——永恒向上定律。BOSS人格看世界，就像玩通关了的玩家在看新手教程。效率是他们的信仰，秩序是他们的呼吸。" },
        { code: "THAN-K", cn: "感恩者", intro: "我感谢苍天！我感谢大地！", image: "THAN-K.png", desc: "恭喜您，您测出了全中国最为罕见的人格。您应当感谢我！感谢您在此刻拥有了生命的滋润！倘若您上班路上堵车了？您也应当说一句：我感谢这次堵车，它让我有更多时间聆听这首美妙的歌曲。THAN-K拥有温润如玉的性格和海纳百川的胸怀。" },
        { code: "OH-NO", cn: "哦不人", intro: "哦不！我怎么会是这个人格？！", image: "OH-NO.png", desc: "“哦不！”并非恐惧的尖叫，而是一种顶级的智慧。当普通人看到一个杯子放在桌沿，哦不人看到的是一场由“水渍-短路-火灾-全楼疏散-经济损失-蝴蝶效应-世界末日”构成的灾难史诗。他们是秩序的守护神。" },

        { code: "SEXY", cn: "尤物", intro: "您就是天生的尤物！", image: "SEXY.png", desc: "当您走进一个房间，照明系统会自动将您识别为天生的尤物，并自觉调暗亮度。当您微笑时，周围的空气湿度也会显著下降，因为水蒸气都凝结成了人眼中的爱心。" },

        { code: "OJBK", cn: "无所谓人", intro: "我说随便，是真的随便。", image: "OJBK.png", desc: "OJBK这已经不是一种人格，而是一种统治哲学。当凡人面临“中午吃米饭还是面条”的世纪抉择时，OJBK人格会用一种批阅奏章般的淡然，轻飘飘地吐出两个字：都行。" },
        { code: "MALO", cn: "吗喽", intro: "人生是个副本，而我只是一只吗喽。", image: "MALO.png", desc: "你的灵魂还停留在那个挂在树上荡秋千、看见香蕉就两眼放光的快乐时代。规则偶尔是可以打破的，天花板是用来倒挂的。" },
        { code: "JOKE-R", cn: "小丑", intro: "原来我们都是小丑。", image: "JOKE-R.jpg", desc: "JOKE-R人格不是一个“人”，更像一个把笑话穿在身上的小丑。你打开一层，是个笑话；再打开一层，是个段子；直到最后，你发现最里面是空的。" },
        { code: "WOC!", cn: "握草人", intro: "卧槽，我怎么是这个人格？", image: "WOC.png", desc: "WOC!人拥有两种完全独立的操作系统：表面系统负责发出“我操”“牛逼”等拟声词；后台系统负责冷静分析：嗯，果然不出我所料。" },
        { code: "THIN-K", cn: "思考者", intro: "已深度思考100s。", image: "THIN-K.png", desc: "THIN-K人格的大脑长时间处于思考状态，注重论点、论据、逻辑推理。当别人看到您独处时在发呆？那不是发呆，是大脑正在对信息进行分类归档。" },
        { code: "SHIT", cn: "愤世者", intro: "这个世界，构石一坨。", image: "SHIT.png", desc: "SHIT的行为模式是一场惊天动地的悖论戏剧。嘴上：这个项目简直是屎。手上：默默打开Excel开始建构函数模型。嘴上：这个世界赶紧毁灭吧。手上：第二天早上七点准时起床去上班。" },
        { code: "ZZZZ", cn: "装死者", intro: "我没死，我只是在睡觉。", image: "ZZZZ.png", desc: "群里99+条消息您可以视而不见，但当有人发出“还有半小时就截止了”的最后通牒时，您会像从千年古墓里苏醒一样，缓缓敲出一个“收到”，然后在29分钟内交卷。" },
        { code: "POOR", cn: "贫困者", intro: "我穷，但我很专。", image: "POOR.png", desc: "这个“贫困”不是钱包余额的判决书，更像一种欲望断舍离后的资源再分配。别人把精力撒成漫天二维码，你把精力压成一束激光。" },
        { code: "MONK", cn: "僧人", intro: "没有那种世俗的欲望。", image: "MONK.png", desc: "MONK已然看破红尘，不希望闲人来扰其清修。个人空间是他们的结界，神圣不可侵犯。行星与行星之间保持着亿万公里的距离，人与人之间为什么不行？" },

    // 图片加载失败时显示占位符
    function setupImage(imgElement, imageName, personaCode) {
        imgElement.src = IMAGE_BASE_URL + imageName;
        imgElement.alt = `${personaCode} 人格形象`;
        
        imgElement.onload = () => {
            console.log(`✅ 图片加载成功: ${imageName}`);
        };
        
        imgElement.onerror = () => {
            console.warn(`❌ 图片加载失败: ${IMAGE_BASE_URL + imageName}`);
            if (!imgElement.parentElement.querySelector('.img-placeholder')) {
                imgElement.style.display = 'none';
                const placeholder = document.createElement('div');
                placeholder.className = 'img-placeholder';
                placeholder.innerText = '🎭';
                placeholder.title = `图片缺失: ${imageName}`;
                imgElement.parentElement.appendChild(placeholder);
            }
        };
    }

        const grid = document.getElementById('personaGrid');
        grid.innerHTML = '';
        
        TYPE_DATA.forEach(persona => {
            const card = document.createElement('div');
            card.className = 'persona-card';
            
            const imgWrapper = document.createElement('div');
            imgWrapper.className = 'image-wrapper';
            imgWrapper.style.position = 'relative';
            
            const img = document.createElement('img');
            img.className = 'persona-img';
            setupImage(img, persona.image, persona.code);
            imgWrapper.appendChild(img);
            
            const infoDiv = document.createElement('div');
            infoDiv.className = 'card-info';
            infoDiv.innerHTML = `
                <div class="persona-code">${persona.code}</div>
                <div class="persona-name">${persona.cn}</div>
                <div class="intro-text">“${persona.intro}”</div>
                <div class="detail-hint">🔍 点击卡片 · 查看完整解读</div>
            `;
            
            card.appendChild(imgWrapper);
            card.appendChild(infoDiv);
            
            card.addEventListener('click', () => openModal(persona));
            grid.appendChild(card);
        });
        
        // 输出统计信息到控制台
        console.log(`📊 共加载 ${TYPE_DATA.length} 个人格，图片基础路径: ${IMAGE_BASE_URL}`);
    }
    
    // 模态框逻辑
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalIntro = document.getElementById('modalIntro');
    const modalDesc = document.getElementById('modalDesc');
    const closeBtn = document.getElementById('closeModalBtn');
    
    function openModal(persona) {
        modalTitle.innerHTML = `${persona.code} <small>${persona.cn}</small>`;
        modalIntro.innerText = `✨ ${persona.intro}`;
        modalDesc.innerText = persona.desc;
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    
    function closeModal() {
        modal.classList.remove('active');
        document.body.style.overflow = '';
    }
    
    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
    });
    
    buildGrid();
</script>
</body>
</html>
